name: Build and Test

on:
  push:
    branches:
      - principal

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore T3_09.sln

      - run: dotnet build T3_09.sln --configuration Release --no-restore

      - run: dotnet test T3_09.sln --no-build