name: Construir y probar

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true     # opcional: evita la advertencia sobre Node.js 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore T3_09.sln

      - name: Build
        run: dotnet build T3_09.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test T3_09.sln --configuration Release --no-build